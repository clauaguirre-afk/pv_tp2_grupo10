<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio11</title>
</head>
<body>
    <script>
        const kilometros = parseInt(prompt(`Ingrese la cantidad de kilometros recorridos por el vehiculo: `));
        const litros = parseInt(prompt(`Ingrese el numero de litros consumidos: `));
        const consumo = litros/kilometros;
        document.write(`El consumo por kilometro es: ${consumo}`);
    </script>
</body>
</html>
