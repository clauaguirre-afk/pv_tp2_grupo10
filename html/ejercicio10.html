<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
</head>
<body>
    <script>
        let cantidad = parseInt(prompt("Cuantos numeros queres ingresar?"));

        let numeros=[];
        let suma=0;

        for(let i=0; i<cantidad; i++){
            let num = parseInt(prompt(`Ingresa el numero ${i + 1}:`));
            numeros.push(num);
            suma += num;
        }

        let promedio = suma/cantidad;

        document.write(`
        Numeros Ingresados: ${numeros.join(", ")}<br>
        Promedio: ${promedio}`)
    </script>
</body>
</html>
